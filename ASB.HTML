        { q: "Ketika melakukan evakuasi korban cedera, prinsip utama yang harus dipegang oleh seorang penolong/anggota PMR adalah...", a: "B", o: ["Kecepatan evakuasi adalah segalanya, keselamatan penolong nomor dua.", "Utamakan keselamatan diri sendiri terlebih dahulu baru keselamatan korban (Do no further harm).", "Evakuasi harus menunggu instruksi dari presiden langsung.", "Korban yang berteriak paling keras harus selalu dievakuasi paling akhir."] },
        { q: "Isyarat darurat menggunakan cermin ke arah helikopter penyelamat memanfaatkan...", a: "A", o: ["Pantulan cahaya matahari (kilatan cahaya secara berkala).", "Penyerapan energi panas bumi.", "Pembiasan warna pelangi.", "Gelombang ultrasonik cermin."] },
        { q: "Apa yang dimaksud dengan 'Hunian Sementara' (Huntara) dalam tahapan pemulihan bencana?", a: "C", o: ["Tenda darurat darurat yang didirikan beberapa jam setelah gempa.", "Rumah permanen yang dibangun oleh pemerintah untuk korban bencana secara gratis dan selamanya.", "Tempat tinggal layak yang dibangun untuk menjembatani masa transisi dari tenda pengungsian darurat menuju rumah permanen (hunian tetap).", "Hotel berbintang yang disewa oleh relawan asing."] },
        { q: "Semboyan PMI dalam penanggulangan bencana yang mencerminkan respons cepat dan tanggap adalah...", a: "D", o: ["'Siamo Tutti Fratelli' (Kita semua bersaudara)", "'Gantungkan cita-citamu setinggi langit'", "'Bersama Kita Bisa, PMI Siap Bantu'", "'PMI Selalu Membantu, Tanggap, Cepat, Tepat'"] },
        { q: "Ketika kamu melihat peta kawasan rawan bencana (KRB) gunung berapi, wilayah yang masuk dalam 'Kawasan Rawan Bencana III' (Warna Merah) artinya...", a: "B", o: ["Wilayah yang sangat aman dari segala jenis material erupsi.", "Wilayah yang berpotensi selalu terancam awan panas, aliran lava, dan gas beracun saat terjadi erupsi, sehingga tidak boleh dijadikan pemukiman tetap.", "Wilayah yang hanya terkena dampak abu vulkanik tipis seminggu sekali.", "Wilayah pusat komando dan rumah sakit utama."] },
        { q: "Apa yang harus dilakukan jika saat banjir melanda rumahmu, air mulai meninggi dan masuk ke dalam instalasi listrik rumah?", a: "A", o: ["Segera matikan sumber listrik utama melalui meteran listrik (MCB) rumah untuk menghindari sengatan listrik di dalam air.", "Membiarkannya saja karena air banjir murni tidak menghantarkan listrik.", "Menyentuh kabel yang terendam air untuk memastikan ada setrum atau tidak.", "Menyirami meteran listrik dengan air agar tidak panas."] },
        { q: "Salah satu bentuk adaptasi perubahan iklim yang juga berfungsi mencegah bencana abrasi dan tsunami di kawasan pesisir pantai adalah...", a: "B", o: ["Pembangunan gedung pencakar langit di tepi pantai.", "Penanaman dan pelestarian hutan mangrove (bakau).", "Pengerukan pasir pantai secara besar-besaran untuk diekspor.", "Membuat pembatas pantai menggunakan kayu lapuk."] },
        { q: "Sebagai tingkatan PMR tertinggi (Wira), setelah kamu menguasai materi 'Ayo Siaga Bencana', tanggung jawab sosial apa yang melekat pada dirimu sesuai dengan Tri Bakti PMR?", a: "B", o: ["Menyimpan ilmu tersebut untuk diri sendiri agar menjadi siswa paling pintar di kelas.", "Menjadi Peer Educator (Pendidik Sebaya) yang aktif menyebarkan pengetahuan kesiapsiagaan bencana kepada teman sebaya, keluarga, dan komunitas sekitar.", "Menuntut bayaran/insentif dari pihak sekolah setiap kali mengadakan sosialisasi.", "Mengambil alih seluruh tugas Badan Penanggulangan Bencana Daerah (BPBD)."] }
    ];

    const container = document.getElementById('quiz-questions');
    const letters = ['A', 'B', 'C', 'D'];

    quizData.forEach((data, index) => {
        if (data.section) {
            let secTitle = document.createElement('div');
            secTitle.className = 'section-title';
            secTitle.innerText = data.section;
            container.appendChild(secTitle);
        }

        let questionBlock = document.createElement('div');
        questionBlock.className = 'question-block';
        
        let qText = document.createElement('div');
        qText.className = 'question-text';
        qText.innerText = `${index + 1}. ${data.q}`;
        questionBlock.appendChild(qText);

        let optionsGroup = document.createElement('div');
        optionsGroup.className = 'options-group';

        data.o.forEach((option, oIndex) => {
            let label = document.createElement('label');
            label.className = 'option-label';
            label.setAttribute('data-question', index);
            label.setAttribute('data-value', letters[oIndex]);
            
            let radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = `question${index}`;
            radio.value = letters[oIndex];
            
            label.appendChild(radio);
            label.appendChild(document.createTextNode(` ${letters[oIndex]}. ${option}`));
            optionsGroup.appendChild(label);
        });

        questionBlock.appendChild(optionsGroup);
        container.appendChild(questionBlock);
    });

    function checkAnswers() {
        let score = 0;
        let unanswered = 0;
        
        document.querySelectorAll('.option-label').forEach(label => {
            label.classList.remove('correct-choice', 'wrong-choice');
        });

        quizData.forEach((data, index) => {
            let selected = document.querySelector(`input[name="question${index}"]:checked`);
            
            let correctLabel = document.querySelector(`.option-label[data-question="${index}"][data-value="${data.a}"]`);
            if (correctLabel) {
                correctLabel.classList.add('correct-choice');
            }

            if (selected) {
                if (selected.value === data.a) {
                    score++;
                } else {
                    let wrongLabel = document.querySelector(`.option-label[data-question="${index}"][data-value="${selected.value}"]`);
                    if (wrongLabel) {
                        wrongLabel.classList.add('wrong-choice');
                    }
                }
            } else {
                unanswered++;
            }
        });

        const resultDiv = document.getElementById('result');
        resultDiv.className = 'success';
        resultDiv.style.display = 'block';
        
        let totalSoal = quizData.length;
        let salah = totalSoal - score - unanswered;
        
        resultDiv.innerHTML = `
            <div class="score-text">Hasil Skor Akhir: ${score} / ${totalSoal}</div>
            <p style="font-size: 16px;">Benar: <strong>${score}</strong> | Salah: <strong>${salah}</strong> ${unanswered > 0 ? `| Belum Dijawab: <strong style="color:orange;">${unanswered}</strong>` : ''}</p>
            <p>Koreksi Kunci Jawaban telah ditampilkan langsung pada daftar soal di atas (Hijau = Kunci Benar, Merah = Jawaban Anda Salah).</p>
        `;
        
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>
