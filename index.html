<script>
    const quizData = [
        // BAGIAN 1
        { section: "BAGIAN 1: PENGANTAR, MANAJEMEN, DAN SIKLUS BENCANA", q: "Apa definisi 'Bencana' yang paling tepat menurut pandangan PMR dan manajemen penanggulangan bencana?", a: "B", o: ["Fenomena alam biasa yang terjadi secara periodik dan tidak dapat dihindari.", "Peristiwa atau rangkaian peristiwa yang mengancam dan mengganggu kehidupan masyarakat, mengakibatkan korban jiwa, kerusakan lingkungan, kerugian harta benda, dan dampak psikologis.", "Kejadian mendadak akibat kelalaian manusia yang hanya merugikan sektor ekonomi negara.", "Suatu kondisi darurat yang sepenuhnya menjadi tanggung jawab Palang Merah Internasional untuk menyelesaikannya."], exp: "Bencana tidak sekadar peristiwa alam, melainkan rangkaian kejadian yang mengancam kehidupan hingga menimbulkan korban jiwa, kerusakan lingkungan, serta kerugian material dan psikologis di masyarakat." },
        { q: "Dalam rumus risiko bencana Risiko = (Ancaman x Kerentanan) / Kapasitas, langkah terbaik yang dapat dilakukan oleh seorang anggota PMR Wira untuk menurunkan tingkat risiko bencana di sekolahnya adalah...", a: "C", o: ["Berdoa agar ancaman alam seperti gempa bumi tidak terjadi.", "Menghilangkan ancaman (hazard) secara total menggunakan teknologi canggih.", "Meningkatkan kapasitas diri dan lingkungan melalui pelatihan kesiapsiagaan dan simulasi.", "Membiarkan kerentanan tetap tinggi karena bencana adalah takdir."], exp: "Ancaman alam (seperti gempa) tidak bisa dihilangkan oleh manusia. Oleh karena itu, cara paling rasional dan efektif menurunkan risiko adalah dengan memperbesar faktor pembagi, yaitu meningkatkan kapasitas (pengetahuan, keterampilan, kesiapsiagaan)." },
        { q: "Manakah di bawah ini yang merupakan contoh dari 'Kerentanan Fisik' suatu masyarakat terhadap bencana gempa bumi?", a: "C", o: ["Kurangnya pengetahuan masyarakat tentang jalur evakuasi.", "Tidak adanya dana darurat yang dimiliki oleh pemerintah daerah.", "Konstruksi bangunan rumah warga yang tidak menggunakan struktur tahan gempa.", "Sikap apatis masyarakat terhadap sosialisasi siaga bencana."], exp: "Kerentanan fisik berkaitan langsung dengan sarana prasarana kebendaan. Rumah atau gedung yang tidak berstruktur tahan gempa merupakan kerentanan fisik yang fatal saat guncangan terjadi." },
        { q: "Siklus manajemen bencana terdiri dari beberapa fase. Fase yang fokus pada kegiatan sebelum terjadinya bencana, meliputi mitigasi dan kesiapsiagaan, disebut fase...", a: "C", o: ["Tanggap Darurat (Response)", "Pascabencana (Recovery)", "Prabencana (Preparedness)", "Rekonstruksi (Reconstruction)"], exp: "Fase sebelum bencana terjadi dikenal dengan istilah prabencana. Di dalam fase inilah dilakukan tindakan preventif jangka panjang (mitigasi) maupun taktis (kesiapsiagaan)." },
        { q: "Kegiatan memasang rambu-ramu jalur evakuasi, membuat sistem peringatan dini (early warning system), dan mengadakan simulasi mandiri di sekolah termasuk dalam upaya...", a: "B", o: ["Mitigasi Struktural", "Kesiapsiagaan (Preparedness)", "Rehabilitasi", "Tanggap Darurat"], exp: "Pemasangan rambu evakuasi, aktivasi alarm/early warning system, serta latihan simulasi adalah rangkaian tindakan praktis untuk mempersiapkan diri menyambut ancaman yang bisa datang kapan saja, yang disebut kesiapsiagaan." },
        { q: "Apa perbedaan mendasar antara 'Mitigasi' dan 'Kesiapsiagaan'?", a: "B", o: ["Mitigasi dilakukan saat bencana, kesiapsiagaan dilakukan setelah bencana.", "Mitigasi adalah upaya jangka panjang untuk mengurangi dampak/risiko bencana, sedangkan kesiapsiagaan adalah tindakan mempersiapkan diri menjelang atau saat bencana diprediksi akan terjadi.", "Mitigasi hanya untuk bencana alam, kesiapsiagaan hanya untuk bencana sosial.", "Tidak ada perbedaan, keduanya memiliki arti dan tindakan yang persis sama."], exp: "Mitigasi berfokus pada pengurangan dampak jangka panjang (misal menanam mangrove), sedangkan kesiapsiagaan fokus pada perencanaan respon saat situasi darurat sudah mendekat (misal tas siaga bencana)." },
        { q: "Ketika bencana baru saja terjadi dan fokus utama adalah menyelamatkan jiwa, mengevakuasi korban, dan memenuhi kebutuhan dasar (pangan/medis), fase ini disebut...", a: "C", o: ["Fase Mitigasi", "Fase Kesiapsiagaan", "Fase Tanggap Darurat", "Fase Rehabilitasi"], exp: "Tindakan penyelamatan langsung (lifesaving) saat kejadian bencana sedang atau baru saja berlangsung masuk ke dalam fase Tanggap Darurat." },
        { q: "Siapakah yang menjadi sasaran utama dari program 'Kesiapsiagaan Bencana Berbasis Masyarakat' (KBBM) yang sering didukung oleh PMI?", a: "B", o: ["Hanya aparat pemerintah setempat.", "Seluruh lapisan masyarakat di wilayah rentan, agar mandiri menghadapi ancaman.", "Hanya anggota PMR dan KSR di wilayah tersebut.", "Para pendatang atau wisatawan asing."], exp: "Sesuai namanya, KBBM menyasar seluruh elemen masyarakat lokal yang tinggal di area rawan bencana agar mereka memiliki kemandirian awal untuk menolong diri sendiri dan tetangga sebelum bantuan luar tiba." },
        { q: "Perbaikan sarana pelayanan publik, infrastruktur dasar, dan rumah warga yang rusak akibat bencana ke tingkat yang memadai (namun bersifat sementara atau awal) pada fase pascabencana dinamakan...", a: "B", o: ["Rekonstruksi", "Rehabilitasi", "Respon", "Relokasi"], exp: "Rehabilitasi adalah pemulihan awal/sementara pelayanan publik dan sarana prasarana dasar. Sedangkan Rekonstruksi adalah pembangunan kembali secara permanen dan menyeluruh." },
        { q: "Sebagai PMR Wira, peran aktif apa yang paling tepat dilakukan saat fase prabencana di lingkungan sekolah?", a: "B", o: ["Menjadi tim utama mendirikan tenda pengungsian besar tanpa pengawasan pembina.", "Melakukan pemetaan risiko (risk mapping) sekolah dan mengedukasi siswa PMR Mula/Madya.", "Memimpin operasi pencarian korban hilang di reruntuhan bangunan.", "Menggalang dana internasional melalui media sosial pribadi."], exp: "Sesuai peran PMR Wira sebagai Peer Educator, tindakan prabencana terbaik adalah mengedukasi tingkatan di bawahnya serta menganalisis risiko lingkungan sekolah (risk mapping) secara aman." },

        // BAGIAN 2
        { section: "BAGIAN 2: BENCANA ALAM - GEOLOGI & METEOROLOGI", q: "Gempa bumi yang disebabkan oleh pergerakan atau pergeseran lempeng tektonik bumi disebut...", a: "C", o: ["Gempa Vulkanik", "Gempa Runtuhan", "Gempa Tektonik", "Gempa Buatan"], exp: "Pergerakan lempeng kulit bumi dinamakan aktivitas tektonik, sehingga gempa yang dipicunya disebut gempa tektonik. Ini merupakan jenis gempa paling destruktif." },
        { q: "Jika kamu sedang berada di dalam ruang kelas di lantai 2 saat terjadi gempa bumi kuat, tindakan pertama yang paling tepat adalah...", a: "C", o: ["Lari secepatnya menuruni tangga darurat atau menggunakan lift.", "Berteriak histeris dan melompat dari jendela untuk menyelamatkan diri.", "Melakukan prinsip Drop, Cover, Hold On (Merunduk, Berlindung di bawah meja kuat, dan Pegangan).", "Berdiri diam di tengah ruangan sambil mendokumentasikan kejadian."], exp: "Berlari turun tangga saat guncangan hebat sangat berbahaya karena risiko jatuh/tertimpa runtuhan plafon tinggi. Tindakan paling aman sementara adalah merunduk dan melindungi kepala di bawah benda kokoh (Drop, Cover, Hold On)." },
        { q: "Tsunami umumnya dipicu oleh gempa bumi bawah laut. Manakah karakteristik gempa bawah laut yang berpotensi besar menimbulkan tsunami?", a: "A", o: ["Gempa dangkal (kedalaman < 70 km), magnitudo besar (> 7.0 SR), dan patahan naik/turun (vertikal).", "Gempa dalam, magnitudo kecil (< 5.0 SR), dan patahan bergeser mendatar (horizontal).", "Gempa yang terjadi di daratan dekat pantai berpasir.", "Semua jenis gempa bumi di laut pasti menghasilkan tsunami tanpa terkecuali."], exp: "Tsunami tercipta jika ada dislokasi volume air laut yang besar secara mendadak. Hal ini dipicu oleh gempa laut yang berpusat dangkal, berkekuatan besar, serta memiliki pergerakan sesar patahan naik atau turun (vertikal)." },
        { q: "Salah satu tanda alam yang paling umum terjadi sesaat sebelum tsunami menghantam pantai (setelah gempa kuat) adalah...", a: "B", o: ["Air laut tiba-tiba pasang sangat tinggi melewati batas normal.", "Air laut tiba-tiba surut secara drastis hingga dasar laut terlihat.", "Angin bertiup kencang dari arah daratan menuju laut.", "Langit tiba-tiba berubah menjadi gelap gulita disertai petir."], exp: "Surutnya air laut secara ekstrem pasca-gempa terjadi karena air ditarik untuk mengisi ruang kosong yang runtuh di pusat patahan bawah laut sebelum dilepaskan kembali sebagai gelombang tsunami raksasa." },
        { q: "Gunung berapi yang mengeluarkan material berupa gas beracun, awan panas, abu vulkanik, dan lava mengalir sedang mengalami erupsi. Istilah awan panas yang terkenal di daerah Gunung Merapi adalah...", a: "B", o: ["Lahar Dingin", "Wedhus Gembel", "Magma Flakes", "Tefrit"], exp: "Wedhus Gembel adalah kearifan lokal masyarakat lereng Gunung Merapi untuk menyebut awan panas (pyroclastic flow) karena bentuk gumpalan asapnya menyerupai bulu domba/kambing gembel." },
        { q: "Masker dan kacamata pelindung adalah APD wajib saat terjadi erupsi gunung berapi. Apa bahaya utama dari abu vulkanik bagi kesehatan jika terhirup tanpa pelindung?", a: "B", o: ["Menyebabkan luka bakar instan pada kulit luar.", "Menyebabkan gangguan pernapasan akut (ISPA) karena abu vulkanik mengandung partikel kristal silika yang tajam.", "Menyebabkan kebutaan permanen dalam waktu 5 detik.", "Menyebabkan tubuh kekurangan vitamin D secara mendadak."], exp: "Abu vulkanik bukanlah abu pembakaran kayu biasa, melainkan batuan dan kaca silika yang hancur menjadi serbuk tajam mikroskopis. Jika terhirup, serbuk ini dapat merusak dan melukai jaringan saluran pernapasan." },
        { q: "Aliran material batuan, pasir, dan kerikil yang bercampur dengan air hujan lebat di hulu gunung berapi dan mengalir deras melalui lembah sungai disebut...", a: "B", o: ["Lahar Panas", "Lahar Dingin (Aliran Sedimen)", "Lava Flow", "Pyroclastic Flow"], exp: "Lahar dingin terjadi akibat akumulasi material vulkanik di puncak gunung yang hanyut terbawa oleh curah hujan tinggi menuju hilir sungai." },
        { q: "Banjir yang terjadi secara mendadak, debit airnya sangat besar, arusnya sangat deras, dan biasanya membawa material lumpur atau batang pohon akibat jebolnya tanggul alam di daerah hulu disebut...", a: "C", o: ["Banjir Rob", "Banjir Genangan", "Banjir Bandang", "Banjir Lokal"], exp: "Karakteristik banjir bandang adalah datang secara tiba-tiba tanpa peringatan lama, bervolume pekat, berarus merusak, dan membawa material padat (kayu/batu)." },
        { q: "Mengapa membuang sampah ke sungai dan mendirikan bangunan di bantaran sungai dapat memicu terjadinya banjir?", a: "A", o: ["Scanning volume tampung sungai berkurang dan menghambat laju aliran air secara alami.", "Karena membuat air sungai berubah warna menjadi keruh.", "Karena memancing ikan-ikan di sungai bermigrasi ke laut.", "Karena meningkatkan curah hujan di wilayah tersebut secara drastis."], exp: "Sampah menyumbat aliran, sementara bangunan liar di pinggir sungai mempersempit penampang sungai, sehingga kapasitas daya tampung debit air sungai menurun drastis." },
        { q: "Tanah longsor sering terjadi di daerah lereng perbukitan/pegunungan. Faktor pemicu alami yang paling sering menyebabkan tanah longsor di Indonesia adalah...", a: "A", o: ["Penebangan pohon secara liar (deforestasi) dikombinasikan dengan hujan lebat berdurasi lama.", "Pembuatan terasering pada lahan pertanian miring.", "Suhu udara yang terlalu panas di siang hari.", "Angin puting beliung yang berputar di atas bukit."], exp: "Air hujan yang meresap ke dalam tanah lereng gundul (tanpa akar pohon pengikat) akan menambah beban berat tanah dan melunakkan lapisan batuan di bawahnya, memicu perosotan tanah massal." },
        { q: "Tanda-tanda geologis yang menunjukkan suatu lereng bukit rawan atau akan segera mengalami longsor adalah...", a: "B", o: ["Munculnya mata air baru berair jernih di puncak bukit.", "Munculnya retakan-retakan di tanah, pohon atau tiang listrik mulai miring, dan pintu rumah di lereng sulit ditutup.", "Tanah di sekitar lereng menjadi semakin keras dan padat.", "Rumput-rumput di lereng tumbuh dengan sangat subur berwarna hijau tua."], exp: "Pergerakan tanah awal ditandai dengan munculnya retakan tapak, miringnya posisi pepohonan/tiang, serta bergesernya struktur kusen jendela/pintu bangunan rumah di daerah lereng." },
        { q: "Angin kencang yang bergerak memutar dengan kecepatan tinggi (mencapai 63 km/jam atau lebih) yang berasal dari awan Cumulonimbus dan sering terjadi pada masa pancaroba dinamakan...", a: "B", o: ["Angin Monsun", "Angin Puting Beliung (Tornado skala kecil)", "Angin Fohn", "Angin Darat"], exp: "Angin puting beliung merupakan fenomena meteorologi lokal berupa angin berputar kencang berdurasi singkat yang dipicu oleh aktivitas awan konvektif Cumulonimbus." },
        { q: "Jika kamu sedang berada di lapangan terbuka dan melihat angin puting beliung mendekat, tindakan keselamatan terbaik adalah...", a: "C", o: ["Segera berlindung di bawah pohon yang tinggi dan rimbun agar tidak kepanasan.", "Berpegangan pada tiang listrik atau papan baliho besar terdekat.", "Tiarap di area yang rendah seperti saluran air/parit yang kering sambil melindungi kepala dengan tangan, menjauh dari benda yang mudah roboh.", "Berlari mengejar angin tersebut untuk merekam video."], exp: "Berlindung di dekat tiang, pohon, atau baliho rawan tertimpa robohan. Tindakan darurat terbaik di lapangan terbuka adalah mencari cekungan/parit kering yang rendah untuk meminimalisir hantaman angin dan material terbang." },
        { q: "Kekeringan (drought) merupakan bencana yang terjadi secara lambat (slow-onset disaster). Dampak paling berbahaya dari kekeringan jangka panjang bagi ketahanan suatu wilayah adalah...", a: "B", o: ["Menurunnya omset penjualan pakaian musim dingin.", "Terjadinya gagal panen secara luas yang dapat memicu krisis pangan dan kelaparan.", "Meningkatnya jumlah air bersih di dalam tanah secara misterius.", "Berkurangnya polusi udara secara total."], exp: "Ketiadaan pasokan air merusak sektor pertanian total (puso), memicu kelangkaan bahan pokok pangan, dan akhirnya menyebabkan masalah gizi buruk hingga kelaparan massal." },
        { q: "Kebakaran hutan dan lahan (Karhutla) sering menimbulkan kabut asap tebal. Langkah kesiapsiagaan kesehatan yang harus disosialisasikan oleh PMR Wira kepada masyarakat saat terjadi kabut asap adalah...", a: "C", o: ["Menyarankan warga untuk sering beraktivitas di luar rumah tanpa masker.", "Mengurangi konsumsi air putih agar tidak sering ke kamar mandi.", "Selalu menutup ventilasi rumah saat asap pekat, memakai masker (minimal masker bedah/N95) jika terpaksa keluar, dan menjaga hidrasi tubuh.", "Membuka semua jendela rumah lebar-lebar agar asap bisa mengalir masuk dan keluar."], exp: "Guna mencegah partikel asap masuk sistem respirasi, ventilasi harus dikondisikan rapat, memakai masker penyaring saat di luar, dan minum banyak air untuk membantu mendetoksifikasi tubuh." },
        // BAGIAN 3
        { section: "BAGIAN 3: BENCANA NON-ALAM, SOSIAL, DAN TEKNOLOGI", q: "Wabah penyakit menular yang menyebar secara global ke berbagai negara dan benua, menjangkiti banyak orang dalam skala internasional (contoh: COVID-19), disebut sebagai...", a: "C", o: ["Endemi", "Epidemi", "Pandemi", "Sporadis"], exp: "Pandemi adalah tingkatan tertinggi sebaran wabah penyakit menular, di mana areanya meluas melintasi batas geografis internasional/global antarbenua." },
        { q: "Penyakit demam berdarah dengue (DBD) sering menjadi KLB (Kejadian Luar Biasa) saat musim hujan. Sebagai PMR Wira, gerakan pencegahan apa yang bisa kamu pelopori di sekolah?", a: "B", o: ["Gerakan memakai jaket tebal setiap hari.", "Gerakan 3M Plus (Menguras, Menutup tempat penampungan air, dan Mendaur ulang barang bekas) untuk memberantas sarang nyamuk.", "Menyemprotkan parfum ruangan sebanyak mungkin di sudut kelas.", "Melarang siswa masuk sekolah jika wilayah rumahnya ada nyamuk."], exp: "Langkah pencegahan utama DBD paling sahih secara epidemiologi adalah memutuskan siklus hidup jentik nyamuk Aedes aegypti melalui gerakan kebersihan 3M Plus." },
        { q: "Kebakaran pemukiman padat penduduk termasuk dalam kategori bencana...", a: "B", o: ["Bencana Alam Murni", "Bencana Non-Alam atau Akibat Kelalaian Manusia (Man-made disaster)", "Bencana Ekologis Luar Angkasa", "Bencana Geologis Klasik"], exp: "Kebakaran di area perkotaan/pemukiman umumnya dipicu aktivitas manusia (korsleting listrik, kompor gas melosot, dll), sehingga diklasifikasikan sebagai bencana non-alam." },
        { q: "Alat pemadam api portable yang wajib ada di fasilitas publik seperti sekolah untuk memadamkan api skala kecil di awal kebakaran disebut...", a: "B", o: ["APD", "APAR (Alat Pemadam Api Ringan)", "Water Cannon", "Hydrant Utama"], exp: "APAR (Alat Pemadam Api Ringan) difungsikan sebagai pertolongan pertama pada kebakaran skala kecil sebelum api membesar tak terkendali." },
        { q: "Cara menggunakan APAR yang benar mengikuti singkatan T.A.S.S. Apa kepanjangan dari T.A.S.S tersebut?", a: "A", o: ["Tarik pin, Arahkan nozzle ke pangkal api, Tekan tuas, Sapukan dari sisi ke sisi.", "Tekan tuas, Arahkan ke atas, Semprotkan air, Simpan kembali.", "Tarik selang, Angkat tabung, Siram api, Selesai.", "Telpon pemadam, Amankan diri, Sorong tabung, Sapu ruangan."], exp: "Prosedur operasional baku APAR secara internasional disingkat PASS atau TASS dalam bahasa Indonesia: Tarik pin pengunci, Arahkan corong ke pangkal api (bukan lidah api), Tekan tuas gagang, dan Sapukan secara merata." },
        { q: "Jika terjadi kebakaran akibat korsleting listrik (arus pendek), bahan pemadam apa yang HARAM/TIDAK BOLEH digunakan untuk menyiramnya?", a: "C", o: ["Pasir kering", "Gas CO2", "Air", "Tepung kimia kering (powder)"], exp: "Air merupakan konduktor listrik yang sangat baik. Menyiram kebakaran listrik menggunakan air berisiko tinggi mengalirkan sengatan listrik maut kembali ke tubuh si penolong." },
        { q: "Konflik sosial antar kelompok masyarakat yang menimbulkan kerusuhan, korban jiwa, dan pengungsian massal dikategorikan sebagai...", a: "C", o: ["Bencana Non-Alam", "Bencana Alam Komplementer", "Bencana Sosial", "Bencana Teknis"], exp: "Bencana sosial didefinisikan sebagai bencana yang diakibatkan oleh interaksi manusia, meliputi konflik horizontal antar kelompok masyarakat atau terorisme." },
        { q: "Kegayanan teknologi seperti kebocoran reaktor nuklir atau kecelakaan industri kimia besar dapat melepaskan zat berbahaya ke lingkungan. Langkah evakuasi pertama bagi warga sekitar adalah...", a: "C", o: ["Mendekati pabrik untuk melihat apa yang bocor.", "Bergerak searah dengan embusan angin agar cepat sampai.", "Bergerak menjauh dengan arah memotong angin (perpendicular) atau melawan arah angin menuju tempat aman (shelter) yang terisolasi.", "Meminum air sungai di sekitar pabrik untuk menetralkan racun."], exp: "Guna menghindari paparan sebaran gas beracun yang terbawa udara, evakuasi harus dilakukan memotong arah angin (crosswind) atau melawan arah embusan agar terhindar dari awan racun." },
        { q: "Kecelakaan transportasi massal (seperti tabrakan kereta api atau jatuhnya pesawat terbang) yang mengakibatkan korban massal melebihi kapasitas penanganan medis lokal dikategorikan sebagai bencana...", a: "B", o: ["Kegagalan Kesiapsiagaan", "Kegagalan Teknologi / Non-Alam", "Bencana Geofisika", "Krisis Sosial Maritim"], exp: "Kecelakaan moda transportasi massal digolongkan ke dalam bencana non-alam yang dipicu oleh faktor kegagalan teknologi ataupun sistem mekanis operasional." },
        { q: "Salah satu dampak psikososial yang sering dialami oleh korban selamat dari bencana besar (seperti perang atau tsunami) berupa trauma mendalam dinamakan...", a: "A", o: ["PTSD (Post-Traumatic Stress Disorder)", "ADHD (Attention Deficit Hyperactivity Disorder)", "OCD (Obsessive-Compulsive Disorder)", "Insomnia Periodik"], exp: "PTSD (Gangguan Stres Pascatrauma) adalah kondisi gangguan mental serius yang muncul pada seseorang setelah mengalami atau menyaksikan peristiwa traumatis yang mengancam nyawa." },

        // BAGIAN 4
        { section: "BAGIAN 4: TINDAKAN DARURAT, LOGISTIK, DAN PERAN PMR", q: "Di dalam sebuah tas siaga bencana (TSB) keluarga, dokumen-dokumen penting sebaiknya disimpan dengan cara...", a: "B", o: ["Dibiarkan berserakan di dalam laci meja kerja.", "Dimasukkan ke dalam kantong plastik kedap air (ziplock) sebelum dimasukkan ke dalam tas.", "Ditempel di dinding ruang tamu agar mudah dilihat saat banjir.", "Dititipkan ke tetangga rumah yang tidak ikut mengungsi."], exp: "Dokumen penting (ijazah, sertifikat, kartu keluarga) rentan hancur atau rusak terkena air (banjir) atau lumpur. Proteksi plastik kedap air (ziplock) wajib diterapkan." },
        { q: "Tas Siaga Bencana (TSB) dipersiapkan untuk memenuhi kebutuhan dasar hidup mandiri selama minimal... jam pertama setelah bencana terjadi.", a: "C", o: ["12 Jam", "24 Jam", "72 Jam (3 Hari)", "240 Jam (10 Hari)"], exp: "Standar durasi emas bertahan hidup darurat mandiri (Golden Time) adalah 72 jam (3 hari). Waktu ini diproyeksikan sebagai durasi maksimum bagi tim evakuasi pusat untuk datang mendirikan posko logistik." },
        { q: "Manakah barang di bawah ini yang TIDAK wajib atau kurang prioritas dimasukkan ke dalam Tas Siaga Bencana (TSB)?", a: "D", o: ["Air minum dan makanan siap saji tahan lama (biskuit/kornet).", "Kotak P3K pribadi dan obat-obatan rutin.", "Senter kecil, peluit, dan radio saku bertenaga baterai.", "Buku pelajaran tebal dan piala penghargaan sekolah."], exp: "Tas Siaga Bencana diutamakan hanya diisi oleh instrumen krusial penunjang hidup darurat (survival kit). Barang hobi atau non-krusial seperti piala dan buku tebal justru membebani pergerakan evakuasi." },
        { q: "Apa fungsi utama dari penyediaan 'Peluit' di dalam Tas Siaga Bencana?", a: "B", o: ["Sebagai alat musik untuk mengusir rasa bosan di pengungsian.", "Sebagai alat pemberi isyarat keberadaan diri jika terjebak di dalam reruntuhan atau kondisi gelap tanpa menguras energi untuk berteriak.", "Untuk menakut-nakuti hewan liar yang mendekat.", "Mengatur lalu lintas ambulans di jalan raya."], exp: "Bila terjebak reruntuhan, berteriak terus-menerus akan menghabiskan energi penolong dengan cepat dan memicu dehidrasi. Tiupan peluit menghasilkan frekuensi tinggi konstan yang hemat energi." },
        { q: "Saat memberikan Pertolongan Pertama Psikologis (PFA - Psychological First Aid) kepada anak-anak korban bencana di pengungsian, tindakan yang tepat adalah...", a: "B", o: ["Memaksa anak menceritakan kronologi detail saat keluarganya tertimbun longsor.", "Mengajak mereka bermain, mendengarkan cerita mereka dengan empati tanpa menghakimi, dan memberikan rasa aman.", "Memberikan janji palsu bahwa rumah mereka akan dibangun kembali esok hari.", "Membiarkan mereka sendirian di pojok tenda agar bisa menenangkan diri."], exp: "Prinsip PFA untuk anak-anak adalah memulihkan rasa aman dan memitigasi trauma awal dengan kegiatan rekreatif/bermain, mendengarkan mereka dengan sabar, tanpa memaksakan memori buruk." },
        { q: "Dalam manajemen pengungsian (shelter), jarak minimum fasilitas sanitasi (toilet/jamban) dari sumber air bersih (sumur) agar tidak terjadi kontaminasi bakteri E.coli adalah...", a: "C", o: ["Minimal 2 meter", "Minimal 5 meter", "Minimal 10-15 meter", "Minimal 100 meter"], exp: "Guna mencegah rembesan limbah tinja mencemari lapisan akuifer air bersih konsumsi pengungsi, jarak antara toilet darurat dan sumur tidak boleh kurang dari 10-15 meter." },
        { q: "Mengapa PMR Wira perlu memahami materi 'Dapur Umum' dalam kesiapsiagaan bencana?", a: "B", o: ["Agar bisa mengambil makanan terlebih dahulu dibanding pengungsi lain.", "Untuk membantu mengorganisir, menyiapkan, dan mendistribusikan makanan bergizi dalam skala besar kepada korban bencana secara higienis.", "Karena PMR Wira bertugas sebagai koki utama restoran internasional PMI.", "Untuk memastikan semua makanan yang dimasak rasanya sangat pedas."], exp: "Dapur umum dalam operasi kemানুsiaan PMI bertugas menyediakan makanan massal secara cepat, layak, sehat, dan higienis untuk menjaga stabilitas fisik para penyintas." },
        { q: "Ketika melakukan evakuasi korban cedera, prinsip utama yang harus dipegang oleh seorang penolong/anggota PMR adalah...", a: "B", o: ["Kecepatan evakuasi adalah segalanya, keselamatan penolong nomor dua.", "Utamakan keselamatan diri sendiri terlebih dahulu baru keselamatan korban (Do no further harm).", "Evakuasi harus menunggu instruksi dari presiden langsung.", "Korban yang berteriak paling keras harus selalu dievakuasi paling akhir."], exp: "Prinsip keselamatan penolong adalah absolut. Jangan sampai penolong ceroboh sehingga ikut menjadi korban tambahan yang justru memberatkan sistem evakuasi." },
        { q: "Isyarat darurat menggunakan cermin ke arah helikopter penyelamat memanfaatkan...", a: "A", o: ["Pantulan cahaya matahari (kilatan cahaya secara berkala).", "Penyerapan energi panas bumi.", "Pembiasan warna pelangi.", "Gelombang ultrasonik cermin."], exp: "Kilatan pantulan sinar matahari via cermin kecil efektif menangkap atensi visual tim SAR udara (helikopter) dari jarak jauh di tengah vegetasi/medan darurat." },
        { q: "Apa yang dimaksud dengan 'Hunian Sementara' (Huntara) dalam tahapan pemulihan bencana?", a: "C", o: ["Tenda darurat darurat yang didirikan beberapa jam setelah gempa.", "Rumah permanen yang dibangun oleh pemerintah untuk korban bencana secara gratis dan selamanya.", "Tempat tinggal layak yang dibangun untuk menjembatani masa transisi dari tenda pengungsian darurat menuju rumah permanen (hunian tetap).", "Hotel berbintang yang disewa oleh relawan asing."], exp: "Huntara didirikan agar pengungsi tidak berlama-lama tinggal di tenda darurat komunal yang kurang sehat, sembari menunggu proses konstruksi rumah permanen (Hunian Tetap / Huntap) selesai." },
        { q: "Semboyan PMI dalam penanggulangan bencana yang mencerminkan respons cepat dan tanggap adalah...", a: "D", o: ["'Siamo Tutti Fratelli' (Kita semua bersaudara)", "'Gantungkan cita-citamu setinggi langit'", "'Bersama Kita Bisa, PMI Siap Bantu'", "'PMI Selalu Membantu, Tanggap, Cepat, Tepat'"], exp: "Semboyan operasional penanggulangan bencana PMI adalah: 'PMI Selalu Membantu, Tanggap, Cepat, Tepat' sebagai komitmen pelayanan kemanusiaan." },
        { q: "Ketika kamu melihat peta kawasan rawan bencana (KRB) gunung berapi, wilayah yang masuk dalam 'Kawasan Rawan Bencana III' (Warna Merah) artinya...", a: "B", o: ["Wilayah yang sangat aman dari segala jenis material erupsi.", "Wilayah yang berpotensi selalu terancam awan panas, aliran lava, dan gas beracun saat terjadi erupsi, sehingga tidak boleh dijadikan pemukiman tetap.", "Wilayah yang hanya terkena dampak abu vulkanik tipis seminggu sekali.", "Wilayah pusat komando dan rumah sakit utama."], exp: "KRB III (Zona Merah) merupakan area paling berbahaya karena posisinya sangat dekat dengan kepundan/puncak kawah, menjadikannya jalur utama terjangan awan panas dan piroklastik primer." },
        { q: "Apa yang harus dilakukan jika saat banjir melanda rumahmu, air mulai meninggi dan masuk ke dalam instalasi listrik rumah?", a: "A", o: ["Segera matikan sumber listrik utama melalui meteran listrik (MCB) rumah untuk menghindari sengatan listrik di dalam air.", "Membiarkannya saja karena air banjir murni tidak menghantarkan listrik.", "Menyentuh kabel yang terendam air untuk memastikan ada setrum atau tidak.", "Menyirami meteran listrik dengan air agar tidak panas."], exp: "Air banjir di pemukiman pekat akan garam mineral/kotoran yang menjadikannya konduktor listrik kuat. Memutus arus dari saklar utama (MCB) mencegah bahaya fatal sengatan arus korsleting lewat air." },
        { q: "Salah satu bentuk adaptasi perubahan iklim yang juga berfungsi mencegah bencana abrasi dan tsunami di kawasan pesisir pantai adalah...", a: "B", o: ["Pembangunan gedung pencakar langit di tepi pantai.", "Penanaman dan pelestarian hutan mangrove (bakau).", "Pengerukan pasir pantai secara besar-besaran untuk diekspor.", "Membuat pembatas pantai menggunakan kayu lapuk."], exp: "Rumpun akar dan jalinan pohon mangrove di sepanjang pesisir pantai berperan efektif memecah energi gelombang air laut, mengurangi laju abrasi tanah, sekaligus meredam daya hancur gelombang tsunami." },
        { q: "Sebagai tingkatan PMR tertinggi (Wira), setelah kamu menguasai materi 'Ayo Siaga Bencana', tanggung jawab sosial apa yang melekat pada dirimu sesuai dengan Tri Bakti PMR?", a: "B", o: ["Menyimpan ilmu tersebut untuk diri sendiri agar menjadi siswa paling pintar di kelas.", "Menjadi Peer Educator (Pendidik Sebaya) yang aktif menyebarkan pengetahuan kesiapsiagaan bencana kepada teman sebaya, keluarga, dan komunitas sekitar.", "Menuntut bayaran/insentif dari pihak sekolah setiap kali mengadakan sosialisasi.", "Mengambil alih seluruh tugas Badan Penanggulangan Bencana Daerah (BPBD)."], exp: "Sesuai marwah Tri Bakti PMR, PMR Wira dilatih menjadi pendidik sebaya (Peer Educator) yang berkarya nyata membagikan ilmu keselamatan dan kapasitas kesiapsiagaan kepada lingkungannya." }
    ];

    let currentIdx = 0;
    let totalScore = 0;
    let currentActiveSection = "";
    const letters = ['A', 'B', 'C', 'D'];

    const container = document.getElementById('quiz-questions');
    const nextBtn = document.getElementById('nextBtn');

    // Generate Soal ke HTML secara Dinamis
    quizData.forEach((data, index) => {
        if (data.section) {
            currentActiveSection = data.section;
        }

        let questionBlock = document.createElement('div');
        questionBlock.className = `question-block ${index === 0 ? 'active' : ''}`;
        questionBlock.id = `q-block-${index}`;
        questionBlock.setAttribute('data-section-name', currentActiveSection);
        
        let qText = document.createElement('div');
        qText.className = 'question-text';
        qText.innerText = `${index + 1}. ${data.q}`;
        questionBlock.appendChild(qText);

        let optionsGroup = document.createElement('div');
        optionsGroup.className = 'options-group';

        data.o.forEach((option, oIndex) => {
            let button = document.createElement('button');
            button.type = 'button';
            button.className = 'option-btn';
            button.id = `opt-${index}-${letters[oIndex]}`;
            button.innerText = `${letters[oIndex]}. ${option}`;
            // Kirim index soal dan huruf pilihan yang diklik
            button.onclick = () => handleAnswer(index, letters[oIndex]);
            
            optionsGroup.appendChild(button);
        });
        questionBlock.appendChild(optionsGroup);

        // Elemen Penjelasan / Pembahasan
        let explanationDiv = document.createElement('div');
        explanationDiv.className = 'explanation-block';
        explanationDiv.id = `explanation-${index}`;
        explanationDiv.innerHTML = `<strong>💡 Pembahasan:</strong> Kunci Jawaban (<b>${data.a}</b>). ${data.exp}`;
        questionBlock.appendChild(explanationDiv);

        container.appendChild(questionBlock);
    });

    // Jalankan update tampilan bar progres pertama kali
    updateProgress();

    function handleAnswer(questionIdx, selectedLetter) {
        const data = quizData[questionIdx];
        const correctLetter = data.a;

        // Ambil semua tombol pilihan dalam soal aktif ini
        const block = document.getElementById(`q-block-${questionIdx}`);
        const buttons = block.getElementsByClassName('option-btn');

        // Nonaktifkan semua tombol agar user tidak bisa klik pilihan lain setelahnya
        for (let btn of buttons) {
            btn.disabled = true;
        }

        // Jika Benar
        if (selectedLetter === correctLetter) {
            document.getElementById(`opt-${questionIdx}-${selectedLetter}`).classList.add('correct-choice');
            totalScore++;
            document.getElementById('live-score').innerText = `Skor: ${totalScore}`;
        } else {
            // Jika Salah
            document.getElementById(`opt-${questionIdx}-${selectedLetter}`).classList.add('wrong-choice');
            document.getElementById(`opt-${questionIdx}-${correctLetter}`).classList.add('correct-choice');
        }

        // Tampilkan Pembahasan secara instan
        document.getElementById(`explanation-${questionIdx}`).style.display = 'block';

        // Munculkan tombol Selanjutnya
        nextBtn.style.display = 'block';
    }

    function nextQuestion() {
        // Sembunyikan soal lama
        document.getElementById(`q-block-${currentIdx}`).classList.remove('active');
        
        currentIdx++;
        nextBtn.style.display = 'none';

        if (currentIdx < quizData.length) {
            // Tampilkan soal baru
            let nextBlock = document.getElementById(`q-block-${currentIdx}`);
            nextBlock.classList.add('active');
            
            // Perbarui Judul Bagian Bab
            let sectionName = nextBlock.getAttribute('data-section-name');
            document.getElementById('current-section').innerText = sectionName;

            updateProgress();
        } else {
            // Selesai, tampilkan hasil akhir
            document.getElementById('quiz-box').style.display = 'none';
            
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'success';
            resultDiv.style.display = 'block';
            
            resultDiv.innerHTML = `
                <div class="score-text">Kuis Selesai! 🎉</div>
                <p style="font-size: 18px;">Total Nilai Anda Benar: <strong>${totalScore}</strong> dari <strong>${quizData.length}</strong> Soal.</p>
                <p style="font-size: 16px;">Persentase Akurasi: <strong>${Math.round((totalScore/quizData.length)*100)}%</strong></p>
                <button class="restart-btn" onclick="location.reload()">Ulangi Kuis</button>
            `;
        }
    }

    function updateProgress() {
        document.getElementById('question-number').innerText = `Soal ${currentIdx + 1} dari ${quizData.length}`;
        let progressPercent = ((currentIdx) / quizData.length) * 100;
        document.getElementById('p-bar').style.width = `${progressPercent}%`;
    }
</script>

</body>
</html>
